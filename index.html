;gap:8px;font-size:.76rem;font-family:Space Mono,monospace}.streak-v{color:#00ff87;font-weight:700}.content{flex:1;overflow-y:auto;scroll-behavior:smooth;scroll-padding-top:12px;position:relative}.panel{display:none;padding:16px;animation:fadeUp .3s ease}.panel.on{display:block}.bnav{position:fixed;bottom:0;left:0;right:0;background:#020b16;border-top:1px solid #1a3d5c;display:grid;grid-template-columns:repeat(5,1fr);padding:6px 0;z-index:50;padding-bottom:max(6px,env(safe-area-inset-bottom))}.nb{flex:1;background:none;border:none;color:#999;padding:10px 4px;font-size:.72rem;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;transition:var(--ease);text-decoration:none;font-family:var(--fb);letter-spacing:.08em;text-transform:uppercase}.nb:hover,.nb.on{color:#00e5ff}.nb-icon{font-size:1.4rem}@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}</style></head><body><div id="app"><header class="hdr"><div class="hdr-logo">APEX</div><div class="hdr-r"><div class="hdr-date" id="hdr-date"></div><div class="streak-pill"><span id="streak-v">0</span></div></div></header><main class="content"><div class="panel on" id="p-dash"><h2>APEX v3 - Health OS</h2><p>Personal health tracking and fitness management system</p><p>Updated version with bug fixes and new features</p></div></main><nav class="bnav"><button class="nb on" data-t="dash">Home</button><button class="nb" data-t="food">Food</button><button class="nb" data-t="workout">Workout</button><button class="nb" data-t="progress">Progress</button><button class="nb" data-t="profile">Profile</button></nav></div><script>function load(){const e=document.querySelector('meta[name="theme-color"]');e&&(e.content='#00e5ff');const t=document.getElementById('hdr-date');if(t){const n=new Date;t.textContent=n.toLocaleDateString('en-IN',{weekday:'short',month:'short',day:'numeric'})}}document.addEventListener('DOMContentLoaded',load);const panels=document.querySelectorAll('.panel');const navButtons=document.querySelectorAll('.nb');navButtons.forEach(e=>{e.addEventListener('click',()=>{const t=e.dataset.t;panels.forEach(e=>e.classList.remove('on'));navButtons.forEach(e=>e.classList.remove('on'));document.getElementById('p-'+t)?.classList.add('on');e.classList.add('on')})});</script></body></html>
